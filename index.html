<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;600;700&display=swap" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;600;700&display=swap">
  </noscript>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    /* Font fallback while Ubuntu loads */
    .ubuntu-regular,
    .ubuntu-medium,
    .ubuntu-semibold,
    .ubuntu-bold {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
  </style>
  <meta name="description"
    content="Web developer in Saskatoon, Canada. Building custom interactive websites that engage visitors and generate more leads" />
  <meta name="theme-color" content="#1d232a" />
  <title>Christian Waters | Web Developer</title>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://christianwaters.dev/">
  <meta property="og:title" content="Christian Waters | Web Developer">
  <meta property="og:description"
    content="Web developer in Saskatoon, Canada. Building custom interactive websites that engage visitors and generate more leads.">
  <meta property="og:image" content="https://christianwaters.dev/og-image.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://christianwaters.dev/">
  <meta property="twitter:title" content="Christian Waters | Web Developer">
  <meta property="twitter:description"
    content="Web developer in Saskatoon, Canada. Building custom interactive websites that engage visitors and generate more leads.">
  <meta property="twitter:image" content="https://christianwaters.dev/og-image.png">

  <!-- JSON-LD -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Christian Waters",
      "jobTitle": "Web Developer",
      "url": "https://christianwaters.dev/",
      "sameAs": [
        "https://github.com/rotisserie-christian",
        "https://linkedin.com/in/cwaters123"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Saskatoon",
        "addressRegion": "Saskatchewan",
        "addressCountry": "Canada"
      },
      "description": "Web developer in Saskatoon, Canada, specializes in building custom interactive websites that engage visitors and generate leads."
    }
  </script>
</head>

<body class="bg-base-200">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
